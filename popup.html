<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Boogily Boogily</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app" aria-label="Boogily Boogily quick copy board">
      <header class="topbar">
        <h1>Boogily Boogily</h1>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </header>

      <section id="textGrid" class="text-grid" aria-label="Saved texts">
        <button type="button" class="copy-card rtl" aria-label="העתק סקר עברית">
          <span class="card-head">
            <span class="card-title">סקר עברית</span>
            <span class="card-index">1</span>
          </span>
          <span class="card-text">לתשומת לבך ובהמשך לשיחתנו, בימים הקרובים ישלח אלייך למייל סקר על חווית השירות שקיבלת מאיתנו, נודה לך ששאם תוכל/י להקדיש מספר דקות ולענות עליו. דעתך חשובה לנו 😊</span>
        </button>

        <button type="button" class="copy-card ltr" aria-label="העתק סקר אנגלית">
          <span class="card-head">
            <span class="card-title">סקר אנגלית</span>
            <span class="card-index">2</span>
          </span>
          <span class="card-text">Following our conversation, a feedback survey will be e-mailed to you in the next coming days.

We thankaand answer it. Your opinion is important to us 😊</span>
        </button>

        <button type="button" class="copy-card rtl" aria-label="העתק הצהרה עברית">
          <span class="card-head">
            <span class="card-title">הצהרה עברית</span>
            <span class="card-index">3</span>
          </span>
          <span class="card-text">שימו לב שעליכם לספק את 4 הספרות האחרונות של הכרטיס שברצונכם שנטען.
אם לא תספקו אותן, הכרטיס המקושר לשם אשר מוצג בשיחת הוואטסאפ זה שייטען.תודה רבה, אנא אשר/י את ההצהרה:

תשלום התביעה מראש לכרטיס הפספורטכארד רילוקשיין שברשותך מתבצע על סמך המידע שמסרת לנו בשיחתנו. יש לשמור מסמכים רפואיים וקבלות. במידה ויתברר בעתיד כי המידע שנמסר אינו מלא או אינו נכון או שמידע שנדרש ממך לא הועבר אלינו בהתאם, או במקרה שהשירותים שנצרכו אינם מכוסים על פי תנאי הפוליסה, אנו מודיעים כי הכספים שהועברו לכרטיס, יגבו בחזרה על ידינו באמצעות אמצעי התשלום הקיים במערכות החברה. כמו כן, במידה ויידרש, נגבה השתתפות עצמית עפ"י תנאי הפוליסה.</span>
        </button>

        <button type="button" class="copy-card ltr" aria-label="העתק הצהרה אנגלית">
          <span class="card-head">
            <span class="card-title">הצהרה אנגלית</span>
            <span class="card-index">4</span>
          </span>
          <span class="card-text">Please note that you must provide the last 4 digits of the card you would like us to load.
If you do not provide them, the card linked to your name will be loaded.

Thank you. Please confirm the following statement:

The advance payment of the claim to your PassportCard Relocation card is based on the information you provided to us during our conversation. Medical documents and receipts must be kept.

If it is later found that the information provided was incomplete or incorrect, or that any information requested from you was not provided to us accordingly, or if the services received are not covered under the terms of the policy, please note that the funds transferred to the card will be collected back by us using the payment method registered in the company’s systems.

In addition, if required, a deductible will be charged in accordance with the terms of the policy.</span>
        </button>

        <button type="button" class="copy-card rtl" aria-label="העתק שלום שמי יוגב איך אוכל לסייע">
          <span class="card-head">
            <span class="card-title">שלום שמי יוגב איך אוכל לסייע</span>
            <span class="card-index">5</span>
          </span>
          <span class="card-text">שלום שמי יוגב :)
 נא לציין תעודת זהות ותאריך לידה
איך אוכל לסייע?</span>
        </button>

        <button type="button" class="copy-card rtl" aria-label="העתק כמה רגעים בבקשה">
          <span class="card-head">
            <span class="card-title">כמה רגעים בבקשה</span>
            <span class="card-index">6</span>
          </span>
          <span class="card-text">כמה רגעים בבקשה</span>
        </button>

        <button type="button" class="copy-card rtl" aria-label="העתק האם אוכל לעזור במשהו נוסף">
          <span class="card-head">
            <span class="card-title">האם אוכל לעזור במשהו נוסף</span>
            <span class="card-index">7</span>
          </span>
          <span class="card-text">האם אוכל לעזור במשהו נוסף? 🙏</span>
        </button>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
